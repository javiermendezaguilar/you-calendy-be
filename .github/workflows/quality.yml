name: Backend Quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Duplicate code scan
        # Backend duplication baseline was reduced from ~5.95% to ~4.72%
        # across the first hardening passes. Keep a strict overall gate below
        # the previous legacy ceiling while we design a separate rule for new code.
        run: npx jscpd --threshold 5 --gitignore --reporters console src

      - name: Fetch base branch for PR quality comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Duplicate code non-regression on PR
        if: github.event_name == 'pull_request'
        env:
          QUALITY_BASE_REF: ${{ github.base_ref }}
        run: node ./scripts/check-jscpd-regression.js
