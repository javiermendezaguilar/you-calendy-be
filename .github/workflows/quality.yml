name: Backend Quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Duplicate code scan
        # Current backend duplication baseline is ~5.3%.
        # Keep the gate slightly above the real baseline so new work is not
        # blocked by historical debt, while still preventing large regressions.
        run: npx jscpd --threshold 6 --gitignore --reporters console src
